spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:smart-city-app/.env[.properties]
      - optional:file:backend/smart-city-app/.env[.properties]
  application:
    name: smart-city-app
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/smartcity}
    username: ${DB_USERNAME:smartcity}
    password: ${DB_PASSWORD:smartcity}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  servlet:
    multipart:
      max-file-size: 5MB
server:
  port: ${SERVER_PORT:8083}

app:
  storage:
    root: ${APP_STORAGE_ROOT:./uploads}
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
  transport:
    # Default path for local runs from smart-city-app module directory
    data-path: ${TRANSPORT_DATA_PATH:../Testing Materials/linia_4.json}
  security:
    jwt:
      secret: ${JWT_SECRET:local-dev-jwt-secret-change-me-before-production}
      access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:9000000}
      refresh-token-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
