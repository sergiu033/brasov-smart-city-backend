databaseChangeLog:
  - changeSet:
      id: 008-create-city-reports-table
      author: antigravity
      changes:
        - createTable:
            tableName: city_reports
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_city_reports_user_id
                    references: users(id)
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_city_reports_category_id
                    references: report_categories(id)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: latitude
                  type: DOUBLE PRECISION
              - column:
                  name: longitude
                  type: DOUBLE PRECISION
              - column:
                  name: photo_url
                  type: VARCHAR(500)
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: NEW
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
