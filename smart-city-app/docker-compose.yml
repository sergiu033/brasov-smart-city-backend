services:
  postgres:
    image: postgres:16
    container_name: smart-city-postgres
    environment:
      POSTGRES_DB: smartcity
      POSTGRES_USER: smartcity
      POSTGRES_PASSWORD: smartcity
      TZ: Europe/Bucharest
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smartcity -d smartcity']
      interval: 5s
      timeout: 5s
      retries: 5

  otp:
    image: eclipse-temurin:21-jre
    container_name: routing_otp
    environment:
      TZ: Europe/Bucharest
    working_dir: /otp-config
    volumes:
      - ../algo-rutare-main/algo-rutare-main/otp-config:/otp-config
    command: java -Xmx4G -jar otp.jar --build --serve .
    ports:
      - "8080:8080"
    restart: unless-stopped

  bridge:
    image: node:20-alpine
    container_name: routing_bridge
    working_dir: /bridge
    volumes:
      - ../:/bridge
      - ../algo-rutare-main/algo-rutare-main/gtfs_transit_data.json:/bridge/gtfs_transit_data.json:ro
    command: sh -c "npm install && node pwa-bridge.js"
    ports:
      - "8081:8081"
    environment:
      OTP_URL: http://otp:8080/otp/routers/default
      GTFS_DATA_PATH: /bridge/gtfs_transit_data.json
      TZ: Europe/Bucharest
    depends_on:
      - otp
    restart: unless-stopped

  smart-city-app:
    image: smart-city-app:latest
    container_name: smart-city-app
    depends_on:
      postgres:
        condition: service_healthy
      otp:
        condition: service_started
      bridge:
        condition: service_started
    env_file:
      - .env
    ports:
      - '8083:8083'
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/smartcity
      DB_USERNAME: smartcity
      DB_PASSWORD: smartcity
      SERVER_PORT: 8083
      APP_STORAGE_ROOT: /app/uploads
    volumes:
      - app_uploads:/app/uploads

