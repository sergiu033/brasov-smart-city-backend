databaseChangeLog:
  - changeSet:
      id: 015-create-user-vehicle-table
      author: gabi
      changes:
        - createTable:
            tableName: user_vehicles
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: plate_number
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGSERIAL
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_vehicles_user_id
                    references: users(id)
                    deleteCascade: true