spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:smartcity-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  storage:
    root: ${java.io.tmpdir}/smart-city-test-uploads
  oauth:
    google:
      client-id: ""
  security:
    jwt:
      secret: test-jwt-secret-for-unit-and-integration-tests-only
      access-token-expiration-ms: 900000
      refresh-token-expiration-days: 7
