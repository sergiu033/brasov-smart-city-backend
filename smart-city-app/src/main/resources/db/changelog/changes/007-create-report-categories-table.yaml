databaseChangeLog:
  - changeSet:
      id: 007-create-report-categories-table
      author: antigravity
      changes:
        - createTable:
            tableName: report_categories
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
