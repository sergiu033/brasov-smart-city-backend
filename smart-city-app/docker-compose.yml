services:
  postgres:
    image: postgres:16
    container_name: smart-city-postgres
    environment:
      POSTGRES_DB: smartcity
      POSTGRES_USER: smartcity
      POSTGRES_PASSWORD: smartcity
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smartcity -d smartcity']
      interval: 5s
      timeout: 5s
      retries: 5

  smart-city-app:
    image: smart-city-app:latest
    container_name: smart-city-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8083:8083'
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/smartcity
      DB_USERNAME: smartcity
      DB_PASSWORD: smartcity
      SERVER_PORT: 8083
      APP_STORAGE_ROOT: /app/uploads
    volumes:
      - app_uploads:/app/uploads

  sonarqube-db:
    image: postgres:16
    container_name: smart-city-sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:community
    container_name: smart-city-sonarqube
    depends_on:
      - sonarqube-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - '9000:9000'
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

volumes:
  postgres_data:
  app_uploads:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
