services:
  otp:
    image: eclipse-temurin:21-jre
    container_name: routing_otp
    environment:
      TZ: Europe/Bucharest
    working_dir: /otp-config
    volumes:
      - ./otp-config:/otp-config
    command: java -Xmx4G -jar otp.jar --build --serve .
    ports:
      - "8080:8080"
    restart: unless-stopped

  bridge:
    image: node:20-alpine
    container_name: routing_bridge
    working_dir: /app
    volumes:
      - .:/app
      - ../../../frontend/public/gtfs_transit_data.json:/app/gtfs_transit_data.json:ro
    command: sh -c "npm install && node pwa-bridge.js"
    ports:
      - "8081:8081"
    environment:
      OTP_URL: http://otp:8080/otp/routers/default/plan
      GTFS_DATA_PATH: /app/gtfs_transit_data.json
      TZ: Europe/Bucharest
    depends_on:
      - otp
    restart: unless-stopped
